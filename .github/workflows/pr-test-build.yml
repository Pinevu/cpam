name: pr-test-build

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-test-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Gofmt check
        run: |
          set -euo pipefail
          files="$(gofmt -l . || true)"
          if [ -n "${files}" ]; then
            echo "gofmt needed for:"
            echo "${files}"
            exit 1
          fi

      - name: Vet
        run: |
          go vet ./...

      - name: Test
        run: |
          go test ./...

      - name: Build
        run: |
          go build -o test-output ./cmd/server
          rm -f test-output
